baseurl = "https://gsergey418.github.io/"
theme = "hugo-coder"

[markup.highlight]
style = "github-dark"

[params]
  keywords = "developer,personal"
  avatarurl = "images/avatar.jpg"

  faviconSVG = "/img/favicon.svg"
  favicon_32 = "/img/favicon-32x32.png"
  favicon_16 = "/img/favicon-16x16.png"

  since = 2019

  enableTwemoji = true

  colorScheme = "auto"
  hidecolorschemetoggle = false

  # customCSS = ["css/custom.css"]
  # customSCSS = ["scss/custom.scss"]
  # customJS = ["js/custom.js"]

[languages]
  [languages.en]
    disabled = false
    contentDir = "content/en"
    languageCode = 'en-US'
    languageName = 'English'
    weight = 0

    title = 'Sergey Gorbunov'

    [languages.en.params]
      author = "Sergey Gorbunov"
      info = "I'm a backend developer from Moscow."
      description = "Sergey's personal website"
    
    [languages.en.menus]
      [[languages.en.menus.main]]
        name = "About"
        weight = 10
        url = "about/"

  [languages.ru]
    disabled = false
    contentDir = "content/ru"
    languageCode = 'ru-RU'
    languageName = 'Русский'
    weight = 1

    title = 'Сергей Горбунов'

    [languages.ru.params]
      author = "Сергей Горбунов"
      info = "Я бэкенд-разработчик из Москвы."
      description = "Личный сайт Сергея"

    [languages.ru.menus]
      [[languages.ru.menus.main]]
        name = "Обо мне"
        weight = 10
        url = "about/"

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"
  author = "authors"

